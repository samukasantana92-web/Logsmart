<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Código de Retirada - LogSmart</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>


<body>


<div class="container">


<div class="card fade">


<img src="img/logo.png" class="logo">


<h1>

Digite seu código

</h1>


<p>

Informe o código recebido para liberar sua encomenda.

</p>


<div class="selected-unit">

📍 Unidade:

<span id="unidadeEscolhida">

Carregando...

</span>

</div>



<input 
type="number"
id="codigo"
placeholder="Digite o código"
>


<button onclick="verificarCodigo()">

Confirmar

</button>



<p class="back" onclick="window.location.href='unidades.html'">

← Escolher outra unidade

</p>


</div>


</div>



<script src="js/script.js"></script>


</body>

</html>

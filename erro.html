<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Código Inválido - LogSmart</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>


<body>


<div class="container">


<div class="card fade error">


<div class="error-animation">

    <div class="error-icon">

        ✕

    </div>

</div>


<img src="img/logo.png" class="logo">


<h1 class="error-title">

Código inválido

</h1>


<p class="error-subtitle">

Não encontramos nenhuma encomenda com esse código.

</p>



<div class="info-box error-info">


<p>

Verifique se o código está correto e tente novamente.

</p>


</div>



<button class="error-button" onclick="window.location.href='codigo.html'">

Tentar novamente

</button>



<p class="back error-back" onclick="window.location.href='index.html'">

← Voltar ao início

</p>


</div>


</div>


<script src="js/script.js"></script>


</body>

</html>
